<!DOCTYPE html>
<html>
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-L7856P3VNT"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-L7856P3VNT');
    </script>
    <base href="https://cdn.jsdelivr.net/gh/rcmcom/tombofthemask@main/">
    <link href="style.css" rel="stylesheet">
    
    <style>
        /* Force hidden via CSS as a first line of defense */
        #sidebarad1, #sidebarad2, .sidebar-frame, .sidebar-close, [id*="sidebar"], [class*="sidebar"] {
            display: none !important;
            opacity: 0 !important;
            pointer-events: none !important;
            width: 0 !important;
            height: 0 !important;
        }
    </style>

    <script>
        // THE AGGRESSIVE CLEANER
        const observer = new MutationObserver(((mutations) => {
            mutations.forEach((mutation) => {
                mutation.addedNodes.forEach((node) => {
                    if (node.id && node.id.includes('sidebar')) {
                        node.remove();
                    }
                    if (node.className && typeof node.className === 'string' && node.className.includes('sidebar')) {
                        node.remove();
                    }
                });
            });
        }));

        observer.observe(document.documentElement, {
            childList: true,
            subtree: true
        });
    </script>
</head>
<body dir="ltr">
    <script src="UnityProgress.js"></script>
    <script src="d5fuh3d/UnityLoader.js"></script>
    
    <script>
        var gameInstance = UnityLoader.instantiate("gameContainer", "d5fuh3d/totm.json", {
            onProgress: UnityProgress,
            Module: {
                onRuntimeInitialized: function() {
                    UnityProgress(gameInstance, "complete")
                }
            }
        });
    </script>

    <div class="webgl-content" style="width: 100%; height: 100%;">
        <div id="gameContainer" style="width: 100vw; height: 100vh; margin: auto"></div>
    </div>
</body>
